name: 'uncle_mays'
version: '1.0.0'
config-version: 2

profile: 'uncle_mays'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  uncle_mays:
    staging:
      +materialized: view
      +schema: staging
    marts:
      core:
        +materialized: table
        +schema: core
      marketing:
        +materialized: table
        +schema: marketing
      finance:
        +materialized: table
        +schema: finance
      reporting:
        +materialized: table
        +schema: reporting

vars:
  # Stripe data lands in this BQ dataset after ingest
  stripe_dataset: "stripe_raw"
  # GA4 export dataset (native BQ export, project uncle-mays-automation)
  ga4_dataset: "analytics_494626869"
  # Meta + Google Ads daily snapshots (bigquery_ads_loader.py -> ads_raw)
  ads_dataset: "ads_raw"
  # Mailchimp + Resend snapshots (crm_loader.py -> crm_raw, not yet built)
  crm_dataset: "crm_raw"
  # Set to true once ml/ingest/bigquery_crm_loader.py lands and crm_raw tables exist
  crm_pipeline_live: false
  # Currency for all money fields
  default_currency: "usd"
  # Internal / founder / smoke-test Stripe customers. Their charges, payment
  # intents, checkout sessions, and customer rows are excluded at the staging
  # layer so analytics + financial marts ignore them. Add new IDs here when
  # team members start running test orders against prod.
  # Confirmed 2026-05-11 via Stripe API.
  internal_test_customer_ids:
    - "cus_ULANE7v2APnG42"  # anthony@unclemays.com (founder)
    - "cus_UN9KFkZFAKGnkF"  # anthonypivy@gmail.com (founder personal)
    - "cus_UOeacOxSfcelAu"  # smoke-test@unclemays.com (smoke test suite)
    - "cus_UN8fJjvyuLyWTy"  # cto-audit-test@unclemays.com (CTO audit)
  # Email domain blocklist. Anything matching is treated as internal even if
  # the customer ID is not yet in internal_test_customer_ids. Catches new
  # team accounts created against prod before someone updates the ID list.
  internal_test_email_domains:
    - "@unclemays.com"
