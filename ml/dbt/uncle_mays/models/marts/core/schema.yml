version: 2

models:
  - name: mart_orders
    description: >
      One row per completed order (PaymentIntent.status = 'succeeded').
      Authoritative revenue fact table. Sources from stg_stripe_payment_intents
      joined to stg_stripe_checkout_sessions.

      Key metrics derivable from this table:
        - AOV: avg(gross_revenue_dollars)
        - Weekly revenue: sum(gross_revenue_dollars) group by order_week
        - Repeat purchase: is_first_order = false
        - Attribution: channel, utm_source, utm_medium, utm_campaign
    columns:
      - name: payment_intent_id
        description: Primary key — Stripe payment intent ID (pi_...)
        tests:
          - unique
          - not_null
      - name: ordered_at
        description: Timestamp of order creation (UTC)
        tests:
          - not_null
      - name: gross_revenue_dollars
        description: >
          Amount received in USD. Use this for revenue reporting.
          Equals amount_received_cents / 100 from Stripe.
        tests:
          - not_null
      - name: channel
        description: >
          Derived acquisition channel. Values: google_ads, meta_ads,
          email, organic_social, organic_search, referral, direct, other.
          Based on has_gclid, has_fbclid, utm_medium, utm_source.
        tests:
          - not_null
          - accepted_values:
              values: ['google_ads', 'meta_ads', 'email', 'organic_social',
                       'organic_search', 'referral', 'direct', 'other']

  - name: mart_customers
    description: >
      One row per unique customer (keyed on email_hash). Aggregates
      order history to produce LTV, AOV, and acquisition channel.

      Key metrics derivable from this table:
        - LTV: ltv_dollars
        - Repeat rate: count(is_repeat_customer) / count(*)
        - Cohort revenue: sum(ltv_dollars) group by acquisition_month
    columns:
      - name: email_hash
        description: Primary key — SHA-256 hash of customer email
        tests:
          - unique
          - not_null
      - name: total_orders
        description: Lifetime order count for this customer
        tests:
          - not_null
      - name: ltv_dollars
        description: Total lifetime revenue from this customer
        tests:
          - not_null
      - name: aov_dollars
        description: Average order value for this customer
        tests:
          - not_null
      - name: is_repeat_customer
        description: True if customer has placed more than one order
        tests:
          - not_null

  - name: mart_cac
    description: >
      Customer Acquisition Cost by channel by week.
      CAC = ad_spend_dollars / new_customers.
      Covers Meta Ads + Google Ads spend. Direct and organic channels
      have ad_spend = 0, so CAC = NULL (not 0) to avoid misleading math.
    columns:
      - name: order_week
        description: Week start date (Monday) of the order cohort
        tests:
          - not_null
      - name: channel
        description: Attribution channel (google_ads, meta_ads, direct, etc.)
        tests:
          - not_null

  - name: mart_conversion_funnel
    description: >
      Session-grain conversion funnel from first touch to purchase.
      One row per GA4 session (user_pseudo_id + ga_session_id).

      Purpose: Expose step-level drop-off rates across the funnel so
      that paid media, UX, and product decisions are grounded in where
      users actually leave — not guesses.

      Steps tracked (in order):
        1. session_start      — baseline
        2. page_view          — any page viewed
        3. view_item          — product detail page viewed
        4. add_to_cart        — item added (reliable from 2026-05-06; commit dea0488)
        5. begin_checkout     — checkout initiated (CTA overlay fixed 2026-05-06; commit 3bb8909)
        6. purchase           — order completed

      Key metrics derivable from this table:
        - view_item → add_to_cart CVR:     countif(has_add_to_cart)    / countif(has_view_item)
        - add_to_cart → begin_checkout CVR: countif(has_begin_checkout) / countif(has_add_to_cart)
        - begin_checkout → purchase CVR:   countif(has_purchase)       / countif(has_begin_checkout)
        - Full funnel CVR:                 countif(has_purchase)       / count(*)
        - Median time-to-purchase:         percentile_cont(0.5) of secs_to_purchase

      Data quality: filter to session_date >= '2026-05-06' for clean numbers.
      Earlier dates have under-counted add_to_cart + begin_checkout due to
      tracking bugs fixed on that date.

      Channel logic is identical to mart_order_attribution — denominators
      for channel CAC and funnel CVR are always consistent.
    columns:
      - name: session_key
        description: >
          Surrogate primary key: concat(user_pseudo_id, '-', ga_session_id).
        tests:
          - unique
          - not_null
      - name: session_date
        description: Date of the session (from the earliest event in the session)
        tests:
          - not_null
      - name: channel
        description: >
          Derived acquisition channel. Identical logic to mart_order_attribution.
          Values: google_ads, email, organic_social, organic_search, referral, other, direct.
        tests:
          - not_null
          - accepted_values:
              values: ['google_ads', 'email', 'organic_social', 'organic_search',
                       'referral', 'other', 'direct']
      - name: has_session_start
        description: True if a session_start event was recorded for this session
        tests:
          - not_null
      - name: has_view_item
        description: True if a view_item event was recorded in this session
        tests:
          - not_null
      - name: has_add_to_cart
        description: True if an add_to_cart event was recorded in this session
        tests:
          - not_null
      - name: has_begin_checkout
        description: True if a begin_checkout event was recorded in this session
        tests:
          - not_null
      - name: has_purchase
        description: True if a purchase event was recorded in this session
        tests:
          - not_null

  - name: mart_logrocket_session_summary
    description: >
      Daily session summary derived from LogRocket via Galileo MCP (UNC-1221).
      One row per UTC calendar day once ml/ingest/logrocket.py --session-summary runs.

      Background: the LogRocket REST /sessions endpoint returns 404. As a workaround,
      logrocket.py --session-summary asks Galileo for structured counts and writes
      1 summary row per day (source = 'galileo_summary') to logrocket_raw.sessions.
      This mart joins those rows with GA4 daily sessions for parity validation.

      Key columns:
        summary_date             — UTC date
        session_count            — total sessions per Galileo
        mobile_sessions          — mobile device sessions
        desktop_sessions         — desktop/tablet sessions
        frustrated_user_count    — users classified as frustrated
        ga4_sessions             — GA4 session_start count for same day
        session_count_vs_ga4_pct — % deviation (NULL if no GA4 data)

      Acceptance criteria (UNC-1221): session_count within 30% of ga4_sessions.
    columns:
      - name: summary_date
        description: UTC calendar date of the session summary
        tests:
          - unique
          - not_null

  - name: mart_retention
    description: >
      Cohort-based retention analysis. One row per acquisition month.
      Measures 30d and 60d repeat purchase rates.
      NOTE: n is very small (11 customers as of 2026-05-07). Use as
      directional signal; CIs are wide until n > 30.
    columns:
      - name: cohort_month
        description: First order month for this cohort
        tests:
          - unique
          - not_null
      - name: cohort_size
        description: Number of unique customers who first ordered this month
        tests:
          - not_null
