version: 2

models:
  - name: stg_stripe_charges
    description: >
      One row per Stripe Charge. Includes both paid and failed charges.
      Source: stripe_charges_*.parquet (ingest via ml/ingest/stripe.py).
    columns:
      - name: charge_id
        description: Stripe charge ID (ch_...)
        tests:
          - unique
          - not_null
      - name: amount_dollars
        description: Charge amount in USD dollars (amount_cents / 100)
        tests:
          - not_null
      - name: charge_status
        description: Stripe charge status (succeeded, failed, pending)
        tests:
          - not_null
          - accepted_values:
              values: ['succeeded', 'failed', 'pending']
      - name: is_paid
        description: True if Stripe reports the charge as paid
        tests:
          - not_null
      - name: created_at
        description: Timestamp when charge was created (UTC)
        tests:
          - not_null

  - name: stg_stripe_checkout_sessions
    description: >
      One row per Stripe Checkout Session. Includes both paid and
      abandoned sessions. 303 sessions as of 2026-05-02 ingest;
      18 paid (5.9% checkout conversion).
    columns:
      - name: checkout_session_id
        description: Stripe checkout session ID (cs_...)
        tests:
          - unique
          - not_null
      - name: payment_status
        description: Stripe payment status (paid, unpaid, no_payment_required)
        tests:
          - not_null
          - accepted_values:
              values: ['paid', 'unpaid', 'no_payment_required']
      - name: is_converted
        description: True if payment_status = 'paid'
        tests:
          - not_null
      - name: created_at
        description: Timestamp when session was created (UTC)
        tests:
          - not_null

  - name: stg_stripe_customers
    description: >
      One row per Stripe Customer. Created at checkout initiation,
      so includes both purchasers and non-converting visitors who
      provided an email.
    columns:
      - name: customer_id
        description: Stripe customer ID (cus_...)
        tests:
          - unique
          - not_null
      - name: created_at
        tests:
          - not_null

  - name: stg_stripe_payment_intents
    description: >
      One row per Stripe PaymentIntent. Carries the authoritative
      attribution metadata (UTM, gclid, fbclid, fbc, fbp) and full
      cart breakdown. 141 rows as of 2026-05-02 ingest.
    columns:
      - name: payment_intent_id
        description: Stripe payment intent ID (pi_...)
        tests:
          - unique
          - not_null
      - name: pi_status
        description: PaymentIntent status
        tests:
          - not_null
          - accepted_values:
              values: ['succeeded', 'canceled', 'requires_payment_method',
                       'requires_confirmation', 'requires_action',
                       'processing', 'requires_capture']
      - name: amount_dollars
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null

  - name: stg_ga4_events
    description: >
      One row per GA4 event. Wraps the BigQuery daily-sharded export
      (analytics_494626869.events_*) in prod and flattened parquet
      snapshots in dev. event_params are unnested inline in BQ.
    columns:
      - name: user_pseudo_id
        description: GA4 anonymous user identifier
        tests:
          - not_null
      - name: event_name
        description: GA4 event name (page_view, purchase, add_to_cart, etc.)
        tests:
          - not_null
      - name: event_ts
        description: Event timestamp (UTC), normalised from BQ microseconds or parquet ISO string
        tests:
          - not_null
      - name: event_date
        description: Event date (UTC) derived from event_date shard suffix
        tests:
          - not_null

  - name: stg_meta_campaign_insights
    description: >
      One row per Meta (Facebook/Instagram) campaign per day.
      Source: meta_campaign_insights_*.parquet (dev) or
      ads_raw.meta_campaign_insights (prod, bigquery_ads_loader.py).
      Deduped on (campaign_id, date) keeping latest snapshot.
    columns:
      - name: campaign_id
        description: Meta campaign ID
        tests:
          - not_null
      - name: report_date
        description: Date of the daily snapshot
        tests:
          - not_null
      - name: spend_usd
        description: Spend in USD for this campaign on this date
        tests:
          - not_null
      - name: impressions
        tests:
          - not_null
      - name: clicks
        tests:
          - not_null

  - name: stg_gads_campaign_insights
    description: >
      One row per Google Ads campaign per day.
      Source: google_ads_campaign_insights_*.parquet (dev) or
      ads_raw.google_ads_campaign_insights (prod, bigquery_ads_loader.py).
      cost_micros retained alongside spend_usd for auditability.
    columns:
      - name: campaign_id
        description: Google Ads campaign ID (cast to string)
        tests:
          - not_null
      - name: report_date
        description: Date of the daily snapshot
        tests:
          - not_null
      - name: spend_usd
        description: Spend in USD (cost_micros / 1,000,000)
        tests:
          - not_null
      - name: impressions
        tests:
          - not_null
      - name: clicks
        tests:
          - not_null
      - name: campaign_status
        tests:
          - not_null
          - accepted_values:
              values: ['ENABLED', 'PAUSED', 'REMOVED']

  - name: stg_mailchimp_members
    description: >
      One row per Mailchimp list member, deduped on email_hash keeping
      most recently changed record. email is PII; downstream joins
      should use email_hash.
    columns:
      - name: email_hash
        description: SHA-256[:24] of lower(trim(email)) — stable join key
        tests:
          - unique
          - not_null
      - name: status
        description: Mailchimp member status
        tests:
          - not_null
          - accepted_values:
              values: ['subscribed', 'unsubscribed', 'cleaned', 'pending', 'transactional']
      - name: is_subscribed
        description: True when status = subscribed
        tests:
          - not_null

  - name: stg_resend_emails
    description: >
      One row per Resend email send, deduped on email_id.
      last_event tracks the furthest delivery state reached.
      delivery_stage maps last_event to a numeric ladder for funnel math.
    columns:
      - name: email_id
        description: Resend UUID for this send
        tests:
          - unique
          - not_null
      - name: sent_at
        description: Timestamp when the email was sent (UTC)
        tests:
          - not_null
      - name: to_hash
        description: SHA-256[:24] of recipient email — joins to stg_mailchimp_members
        tests:
          - not_null
      - name: last_event
        description: Furthest delivery event reached
        tests:
          - not_null
          - accepted_values:
              values: ['sent', 'delivered', 'opened', 'clicked', 'bounced', 'complained', 'unsubscribed']
      - name: delivery_stage
        description: Numeric delivery ladder (3=clicked, 2=opened, 1=delivered, 0=sent, negatives=negative outcomes)

  - name: stg_airtable__catalog
    description: >
      One row per catalog SKU. 47 rows as of 2026-05-26.
      price_dollars = priceoverridecents / 100; cost_dollars = costcents / 100.
      All rows retained (active + inactive) — marts apply is_active filter.
    columns:
      - name: catalog_id
        description: Airtable record ID for the SKU
        tests:
          - unique
          - not_null
      - name: sku
        description: Internal SKU identifier (e.g. KALE-BUNCH)
        tests:
          - not_null
      - name: product_name
        description: Customer-facing product name
        tests:
          - not_null
      - name: price_dollars
        description: Customer-facing price in USD (priceoverridecents / 100)
        tests:
          - not_null
      - name: is_active
        description: True if the SKU is active in the storefront
        tests:
          - not_null

  - name: stg_airtable__pickup_slots
    description: >
      One row per pickup window slot. 12 rows as of 2026-05-26.
      capacity_remaining = capacity - bookings; is_full = bookings >= capacity.
    columns:
      - name: slot_id
        description: Airtable record ID for the pickup slot
        tests:
          - unique
          - not_null
      - name: is_active
        description: True if the slot is still open for booking
        tests:
          - not_null
      - name: bookings
        description: Number of orders booked into this slot
        tests:
          - not_null
      - name: capacity
        description: Maximum orders this slot can accommodate
        tests:
          - not_null
      - name: is_full
        description: True when bookings >= capacity
        tests:
          - not_null

  - name: stg_crm__apollo_contacts
    description: >
      One row per Apollo.io BD/prospecting contact. 3,347 rows as of 2026-05-26.
      These are outreach targets, NOT customers. email_hash is the join key.
    columns:
      - name: apollo_id
        description: Apollo contact ID
        tests:
          - unique
          - not_null
      - name: email_hash
        description: SHA-256[:24] of contact email — stable join key
        tests:
          - not_null

  - name: stg_logrocket__sessions
    description: >
      One row per LogRocket session (REST mode) or per day (Galileo summary mode).
      3 rows as of 2026-05-26 — all Galileo summaries. Per-session rows will appear
      once the LogRocket REST API issue (UNC-1221) is resolved.
      is_summary = true for Galileo aggregate rows; false for per-session rows.
    columns:
      - name: session_source
        description: Source of the row — 'galileo_summary' or 'rest'
        tests:
          - not_null
          - accepted_values:
              values: ['galileo_summary', 'rest']
      - name: is_summary
        description: True for Galileo daily aggregate rows
        tests:
          - not_null
      - name: pulled_at
        description: Timestamp when data was pulled from LogRocket API (UTC)

  - name: stg_logrocket__galileo_briefings
    description: >
      One row per Galileo on-demand query result. 22 rows as of 2026-05-26.
      chat_id groups queries into a conversation thread.
      is_complete = true when answer is populated.
    columns:
      - name: prompt_id
        description: Unique identifier for this Galileo query
        tests:
          - unique
          - not_null
      - name: chat_id
        description: Galileo conversation thread ID — groups related queries
        tests:
          - not_null
      - name: status
        description: Galileo query status
        tests:
          - not_null
      - name: is_complete
        description: True when Galileo returned an answer
        tests:
          - not_null
      - name: pulled_at
        description: Timestamp when briefing was fetched (UTC)
        tests:
          - not_null

  - name: stg_ops__census_acs_zip
    description: >
      ACS 5-year census estimates by ZIP code. 45 rows covering Uncle May's
      Chicago delivery area. Join key = zip → shipping_zip in stg_stripe_payment_intents.
      Used for market-area segmentation. No PII.
    columns:
      - name: zip
        description: 5-digit ZIP code
        tests:
          - unique
          - not_null
      - name: median_household_income
        description: ACS median household income estimate for the ZIP
      - name: total_population
        description: ACS total population estimate for the ZIP
